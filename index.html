<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>!!! TAKII WORLD !!!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial Black', sans-serif;
            cursor: pointer;
            transition: background 0.1s;
        }

        /* 跳ね回る名前のコンテナ */
        #bouncing-name {
            position: absolute;
            font-size: 10vw;
            font-weight: 900;
            white-space: nowrap;
            user-select: none;
            text-transform: uppercase;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.8));
        }

        /* 奇抜な装飾ボックス */
        .glitch-box {
            position: absolute;
            border: 5px solid;
            mix-blend-mode: difference;
            animation: distort 0.5s infinite;
        }

        @keyframes distort {
            0% { transform: skew(0deg); }
            50% { transform: skew(20deg) scale(1.1); }
            100% { transform: skew(-10deg); }
        }

        /* 中央のメッセージ */
        .message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            color: #000;
            padding: 20px;
            font-size: 2rem;
            border: 10px double #000;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body onmousemove="discoTime()">

    <div id="bouncing-name">takii</div>

    <div class="message-box">
        WELCOME TO<br>
        <span style="font-size: 4rem;">takii's</span><br>
        RAINBOW HELL
    </div>

    <script>
        const nameTag = document.getElementById('bouncing-name');
        let posX = 0, posY = 0;
        let velX = 5, velY = 5;

        // 名前を跳ね返らせるアニメーション
        function moveName() {
            const maxX = window.innerWidth - nameTag.offsetWidth;
            const maxY = window.innerHeight - nameTag.offsetHeight;

            posX += velX;
            posY += velY;

            if (posX >= maxX || posX <= 0) {
                velX *= -1;
                changeColor(nameTag);
            }
            if (posY >= maxY || posY <= 0) {
                velY *= -1;
                changeColor(nameTag);
            }

            nameTag.style.left = posX + 'px';
            nameTag.style.top = posY + 'px';
            requestAnimationFrame(moveName);
        }

        // ランダムな色を生成
        function getRandomColor() {
            return `hsl(${Math.random() * 360}, 100%, 50%)`;
        }

        function changeColor(element) {
            element.style.color = getRandomColor();
        }

        // マウスを動かすたびに背景と要素を狂わせる
        function discoTime() {
            document.body.style.backgroundColor = getRandomColor();
            
            // 謎のボックスを生成
            if(Math.random() > 0.9) {
                const box = document.createElement('div');
                box.className = 'glitch-box';
                box.style.width = Math.random() * 300 + 'px';
                box.style.height = Math.random() * 300 + 'px';
                box.style.left = Math.random() * window.innerWidth + 'px';
                box.style.top = Math.random() * window.innerHeight + 'px';
                box.style.borderColor = getRandomColor();
                document.body.appendChild(box);
                
                // 数秒で消す
                setTimeout(() => box.remove(), 1000);
            }
        }

        moveName();
    </script>
</body>
</html>
